<!DOCTYPE html>
<html>
<head>
<title>Zara Music</title>

<style>

body{
background:#121212;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#1db954;
padding:20px;
text-align:center;
font-size:24px;
}

#search{
width:80%;
padding:10px;
margin:20px;
font-size:16px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.song{
background:#1e1e1e;
padding:15px;
border-radius:10px;
}

button{
background:#1db954;
border:none;
padding:8px;
margin-top:10px;
color:white;
border-radius:5px;
cursor:pointer;
}

.like{
background:#ff4d6d;
}

</style>
</head>

<body>

<header>Zara Music 🎧</header>

<center>
<input id="search" placeholder="Search songs..." onkeyup="searchSongs()">
</center>

<div class="container" id="musicContainer"></div>

<script>

const songs = []

for(let i=1;i<=200;i++){
songs.push({
title:"Song "+i,
file:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-"+((i%16)+1)+".mp3"
})
}

const container = document.getElementById("musicContainer")

function loadSongs(list){

container.innerHTML=""

list.forEach((song,index)=>{

let div=document.createElement("div")
div.className="song"

div.innerHTML=`
<h3>${song.title}</h3>
<audio id="audio${index}" src="${song.file}"></audio>

<button onclick="playSong(${index})">Play</button>
<button onclick="pauseSong(${index})">Pause</button>
<button class="like" onclick="likeSong(this)">❤ Like</button>
`

container.appendChild(div)

})

}

function playSong(id){
document.getElementById("audio"+id).play()
}

function pauseSong(id){
document.getElementById("audio"+id).pause()
}

function likeSong(btn){

if(btn.innerText=="❤ Like"){
btn.innerText="💚 Liked"
}else{
btn.innerText="❤ Like"
}

}

function searchSongs(){

let text=document.getElementById("search").value.toLowerCase()

let filtered=songs.filter(song =>
song.title.toLowerCase().includes(text)
)

loadSongs(filtered)

}

loadSongs(songs)

</script>

</body>
</html>
